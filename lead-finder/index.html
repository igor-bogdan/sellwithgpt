<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lead Finder — SELLwithGPT!</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f3f1;
      color: #111;
    }

  main {
  max-width: 1120px;
  margin: 0 auto;
  padding: 72px 24px;
    }

    .screenshot-stack {
      display: grid;
      gap: 40px;
    }

.screenshot-card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 22px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    .screenshot-card img {
      display: block;
      width: 100%;
      height: auto;
    }

.screenshot-mosaic {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  gap: 32px;
  align-items: start;
   }

    @media (max-width: 900px) {
      main {
        padding: 40px 16px;
      }

      .screenshot-stack {
        gap: 28px;
      }

      .screenshot-mosaic {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="screenshot-stack">
      <div class="screenshot-card">
        <img src="../assets/lead-finder/lead-finder-setup.png.png" alt="">
      </div>

      <div class="screenshot-mosaic">
        <div class="screenshot-card">
          <img src="../assets/lead-finder/lead-finder-scanner-downloads.png.png" alt="">
        </div>

        <div class="screenshot-card">
          <img src="../assets/lead-finder/lead-finder-results.png.png" alt="">
        </div>
      </div>
    </div>
  </main>
</body>
</html>
