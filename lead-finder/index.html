<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SELLwithGPT Lead Finder</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f3f1;
      color: #111;
    }

    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .hero {
      margin-bottom: 48px;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(56px, 8vw, 112px);
      line-height: 0.92;
      letter-spacing: -0.07em;
      margin: 0 0 28px;
    }

    .lead {
      max-width: 820px;
      font-size: 24px;
      line-height: 1.45;
      color: #333;
      margin: 0;
    }

    .shot-stack {
      display: grid;
      gap: 40px;
    }

    .shot {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }

    .shot img {
      display: block;
      width: 100%;
      height: auto;
    }

    .shot--narrow {
      max-width: 640px;
      margin: 0 auto;
    }

    @media (max-width: 800px) {
      main {
        padding: 40px 16px;
      }

      .lead {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero">
      <div class="eyebrow">SELLwithGPT!</div>
      <h1>Lead Finder</h1>
      <p class="lead">
        Local business discovery, qualification, scoring, and export workflow
        built for targeted Shopify outreach.
      </p>
    </section>

    <section class="shot-stack">
      <div class="shot">
        <img src="../assets/lead-finder/lead-finder-setup.png" alt="Lead Finder setup and advanced filters">
      </div>

      <div class="shot shot--narrow">
        <img src="../assets/lead-finder/lead-finder-scanner-downloads.png" alt="Lead Finder scanner and download controls">
      </div>

      <div class="shot">
        <img src="../assets/lead-finder/lead-finder-results.png" alt="Lead Finder good leads table">
      </div>
    </section>
  </main>
</body>
</html>
